version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: studio_db
    environment:
      POSTGRES_USER: studio_admin
      POSTGRES_PASSWORD: studio_secure_password
      POSTGRES_DB: studio_management
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: